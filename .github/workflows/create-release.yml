name: Create Release

on:
  workflow_call:
    inputs:
      branch:
        description: The merged branch name (e.g. release/v1.1.0 or hotfix/v1.1.0)
        required: true
        type: string

      release_body:
        description: Optional release body text. Falls back to auto-generated release notes if not provided.
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Extract version
        id: version
        shell: bash
        run: |
          BRANCH="${{ inputs.branch }}"
          VERSION="${BRANCH#release/}"
          VERSION="${VERSION#hotfix/}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ inputs.release_body }}
          generate_release_notes: ${{ inputs.release_body == '' }}
