name: Sync Main to Develop

on:
  workflow_call:
    inputs:
      source_branch:
        description: Source branch name
        required: false
        default: main
        type: string

      target_branch:
        description: Target branch name
        required: false
        default: develop
        type: string

    secrets:
      approval_token:
        description: PAT with write access to auto-approve the PR. Falls back to GITHUB_TOKEN if not provided.
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if sync is needed
        id: check
        run: |
          git fetch origin
          AHEAD=$(git rev-list --count "origin/${{ inputs.target_branch }}..origin/${{ inputs.source_branch }}")
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          if [ "$AHEAD" -gt 0 ]; then
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR to sync source into target
        if: steps.check.outputs.needs_sync == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL=$(gh pr create \
            --base "${{ inputs.target_branch }}" \
            --head "${{ inputs.source_branch }}" \
            --title "Sync ${{ inputs.source_branch }} into ${{ inputs.target_branch }}" \
            --body "Automatically syncing \`${{ inputs.source_branch }}\` into \`${{ inputs.target_branch }}\`.")

          echo "Created PR: $PR_URL"

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_ENV"

      - name: Auto-approve PR
        if: steps.check.outputs.needs_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.approval_token || github.token }}
        run: |
          gh pr review "${{ env.pr_number }}" --approve || echo "Auto-approve not available, PR left open"

      - name: Enable auto-merge
        if: steps.check.outputs.needs_sync == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ env.pr_number }}" --auto --merge || echo "Auto-merge not available, PR left open"
