name: Sync Main to Develop

on:
  workflow_call:
    inputs:
      main_branch:
        description: Main branch name
        required: false
        default: main
        type: string

      develop_branch:
        description: Develop branch name
        required: false
        default: develop
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if sync is needed
        id: check
        run: |
          git fetch origin
          AHEAD=$(git rev-list --count "origin/${{ inputs.develop_branch }}..origin/${{ inputs.main_branch }}")
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          if [ "$AHEAD" -gt 0 ]; then
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR to sync main into develop
        if: steps.check.outputs.needs_sync == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL=$(gh pr create \
            --base "${{ inputs.develop_branch }}" \
            --head "${{ inputs.main_branch }}" \
            --title "Sync ${{ inputs.main_branch }} into ${{ inputs.develop_branch }}" \
            --body "Automatically syncing \`${{ inputs.main_branch }}\` into \`${{ inputs.develop_branch }}\`.")

          echo "Created PR: $PR_URL"

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          gh pr merge "$PR_NUMBER" --auto --merge || echo "Auto-merge not available, PR left open"
